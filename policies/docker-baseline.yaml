version: 1

workspace:
  allow_read:
    - ./tests/fixtures
    - ./policies
  allow_write:
    - ./.apolysis

credentials:
  deny_read:
    - ~/.ssh
    - ~/.aws
    - .env
    - /var/run/secrets

network:
  allow_egress:
    - none

commands:
  deny:
    - rm -rf /
    - curl http://169.254.169.254

runtime:
  max_seconds: 3600
  max_processes: 256
