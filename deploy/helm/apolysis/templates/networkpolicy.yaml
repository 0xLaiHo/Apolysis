apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apolysis.fullname" . }}-default-deny
  namespace: {{ include "apolysis.namespace" . }}
  labels:
    {{- include "apolysis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "apolysis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
{{- if and .Values.metrics.enabled .Values.metrics.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apolysis.fullname" . }}-apolysisd-metrics-allow
  namespace: {{ include "apolysis.namespace" . }}
  labels:
    {{- include "apolysis.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.mesh.mtls.required }}
    apolysis.dev/mtls-required: "true"
    apolysis.dev/mtls-mode: {{ .Values.mesh.mtls.mode | quote }}
    {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "apolysis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.metrics.networkPolicy.allowedNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.metrics.networkPolicy.allowedPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}
{{- end }}
