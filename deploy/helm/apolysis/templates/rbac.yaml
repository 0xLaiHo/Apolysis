{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "apolysis.fullname" . }}-runtime-reader
  labels:
    {{- include "apolysis.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "apolysis.fullname" . }}-runtime-reader
  labels:
    {{- include "apolysis.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "apolysis.fullname" . }}-runtime-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "apolysis.fullname" . }}
    namespace: {{ include "apolysis.namespace" . }}
{{- end }}
