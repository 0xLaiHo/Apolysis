{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apolysis.fullname" . }}
  namespace: {{ include "apolysis.namespace" . }}
  labels:
    {{- include "apolysis.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
