name: Starter issue
description: Pick or propose a small, labeled first contribution.
title: "starter: "
labels:
  - good first issue
  - help wanted
body:
  - type: markdown
    attributes:
      value: |
        Good starter tasks should improve fixtures, docs, examples, or small validation gates without broadening Apolysis into a sandbox, approval UI, or central query product.
  - type: dropdown
    id: starter
    attributes:
      label: Starter area
      options:
        - Runtime evidence fixtures
        - Release artifact verification
        - Timeline shipping documentation
        - Documentation clarity
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the concrete file or behavior to improve.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: List the exact local command that should pass.
      placeholder: make test
    validations:
      required: true
