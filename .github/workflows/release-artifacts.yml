name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.2.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: linux x86_64 release artifacts
    runs-on: ubuntu-latest
    env:
      APOLYSIS_RELEASE_TARGET: x86_64-unknown-linux-gnu
      APOLYSIS_RELEASE_BINARY: target/release/apolysis
      APOLYSIS_RELEASE_BPF_OBJECT: target/ebpf/apolysis_observer.bpf.o
      APOLYSIS_RELEASE_OUTPUT_DIR: target/release-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install release build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm bpftool

      - name: Build CLI binary
        run: cargo build --release -p apolysis-cli --bin apolysis

      - name: Build CO-RE BPF object
        run: make build-ebpf

      - name: Package release artifacts
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_version="$GITHUB_REF_NAME"
          else
            release_version="${{ inputs.version }}"
          fi
          [[ -n "$release_version" ]]
          APOLYSIS_RELEASE_VERSION="$release_version" ./scripts/package-release-artifacts.sh

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: apolysis-linux-x86_64-release-artifacts
          path: target/release-artifacts
          if-no-files-found: error
          retention-days: 30

      - name: Upload assets to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_version="$GITHUB_REF_NAME"
          package="target/release-artifacts/apolysis-${release_version}-${APOLYSIS_RELEASE_TARGET}.tar.gz"
          checksum="${package}.sha256"
          manifest="target/release-artifacts/apolysis-release-manifest.json"
          if ! gh release view "$release_version" >/dev/null 2>&1; then
            gh release create "$release_version" \
              --title "$release_version" \
              --notes "Apolysis $release_version"
          fi
          gh release upload "$release_version" "$package" "$checksum" "$manifest" --clobber
