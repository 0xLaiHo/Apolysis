name: F5 Final Provider Evidence

on:
  workflow_dispatch:
    inputs:
      run_aws_kms:
        description: Run F5.25 AWS KMS signing evidence
        type: boolean
        default: true
      run_gke_mesh:
        description: Run F5.27 managed Cloud Service Mesh evidence
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  aws-kms-signing:
    name: F5.25 AWS KMS signing evidence
    if: ${{ inputs.run_aws_kms }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      APOLYSIS_CONFIRM_F5_AWS_KMS_SIGNING: "1"
      APOLYSIS_F5_AWS_KMS_KEY_ID: ${{ secrets.F5_AWS_KMS_KEY_ID }}
      APOLYSIS_F5_AWS_REGION: ${{ vars.F5_AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install AWS CLI dependencies
        run: |
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.F5_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.F5_AWS_REGION }}

      - name: Run AWS KMS signing evidence gate
        run: ./scripts/test-f5-aws-kms-signing.sh

      - name: Upload AWS KMS signing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f5-aws-kms-signing-evidence
          path: target/f5-aws-kms-signing.*
          if-no-files-found: error
          retention-days: 30

  gke-managed-mesh:
    name: F5.27 managed Cloud Service Mesh evidence
    if: ${{ inputs.run_gke_mesh }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      APOLYSIS_CONFIRM_F5_MANAGED_CLOUD_SERVICE_MESH: "1"
      APOLYSIS_F5_GKE_MESH_FLEET_PROJECT: ${{ vars.F5_GKE_MESH_FLEET_PROJECT }}
      APOLYSIS_F5_GKE_MESH_MEMBERSHIP: ${{ vars.F5_GKE_MESH_MEMBERSHIP }}
      APOLYSIS_F5_GKE_MESH_MEMBERSHIP_LOCATION: ${{ vars.F5_GKE_MESH_MEMBERSHIP_LOCATION }}
      APOLYSIS_F5_GKE_MESH_CLUSTER_NAME: ${{ vars.F5_GKE_MESH_CLUSTER_NAME }}
      APOLYSIS_F5_GKE_MESH_REVISION: ${{ vars.F5_GKE_MESH_REVISION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.F5_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.F5_GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.F5_GKE_CLUSTER_PROJECT }}
          cluster_name: ${{ vars.F5_GKE_CLUSTER_NAME }}
          location: ${{ vars.F5_GKE_CLUSTER_LOCATION }}

      - name: Run managed Cloud Service Mesh evidence gate
        run: ./scripts/test-f5-managed-cloud-service-mesh.sh

      - name: Upload managed Cloud Service Mesh evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f5-managed-cloud-service-mesh-evidence
          path: target/f5-managed-cloud-service-mesh.*
          if-no-files-found: error
          retention-days: 30
