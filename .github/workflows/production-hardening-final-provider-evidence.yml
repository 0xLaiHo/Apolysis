name: ProductionHardening Final Provider Evidence

on:
  workflow_dispatch:
    inputs:
      run_aws_kms:
        description: Run production-hardening.aws-kms-signing AWS KMS signing evidence
        type: boolean
        default: true
      run_aws_kms_bootstrap:
        description: Run production-hardening.aws-kms-signer-bootstrap AWS KMS signer bootstrap before production-hardening.aws-kms-signing signing
        type: boolean
        default: true
      aws_kms_bootstrap_mode:
        description: AWS KMS signer bootstrap mode
        type: choice
        options:
          - inspect
          - ensure
        default: inspect
      confirm_aws_kms_key_creation:
        description: Allow production-hardening.aws-kms-signer-bootstrap ensure mode to create a missing AWS KMS signing key
        type: boolean
        default: false
      run_gke_mesh:
        description: Run production-hardening.managed-cloud-service-mesh managed Cloud Service Mesh evidence
        type: boolean
        default: true
      assemble_final_bundle:
        description: Assemble final ProductionHardening provider bundle after provider evidence gates pass
        type: boolean
        default: true
      retained_signing_provider_artifact:
        description: Treat retained provider artifacts as satisfying signing evidence, for external HSM or prior KMS runs
        type: boolean
        default: false
      retained_managed_mesh_provider_artifact:
        description: Treat retained provider artifacts as satisfying managed service-mesh evidence, for prior managed-mesh provider runs
        type: boolean
        default: false
      retained_provider_artifact_run_id:
        description: Optional workflow run ID containing retained WORM/registry provider artifacts
        type: string
        required: false
      retained_provider_artifact_url:
        description: Optional HTTPS URL for an apolysis-production-hardening-retained-provider-artifacts.tar.gz package
        type: string
        required: false
      retained_provider_artifact_sha256:
        description: Required SHA-256 hex digest when retained_provider_artifact_url is set
        type: string
        required: false

permissions:
  contents: read

jobs:
  aws-kms-signing:
    name: production-hardening.aws-kms-signing AWS KMS signing evidence
    if: ${{ inputs.run_aws_kms }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      APOLYSIS_CONFIRM_PRODUCTION_HARDENING_AWS_KMS_SIGNING: "1"
      APOLYSIS_PRODUCTION_HARDENING_AWS_KMS_KEY_ID: ${{ secrets.ProductionHardening_AWS_KMS_KEY_ID }}
      APOLYSIS_PRODUCTION_HARDENING_AWS_KMS_ALIAS: ${{ vars.ProductionHardening_AWS_KMS_ALIAS }}
      APOLYSIS_PRODUCTION_HARDENING_AWS_REGION: ${{ vars.ProductionHardening_AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install AWS CLI dependencies
        run: |
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ProductionHardening_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ProductionHardening_AWS_REGION }}

      - name: Run AWS KMS signer bootstrap
        if: ${{ inputs.run_aws_kms_bootstrap }}
        env:
          APOLYSIS_CONFIRM_PRODUCTION_HARDENING_AWS_KMS_SIGNER_BOOTSTRAP: "1"
          APOLYSIS_REQUIRE_PRODUCTION_HARDENING_AWS_KMS_SIGNER_BOOTSTRAP: "1"
          APOLYSIS_PRODUCTION_HARDENING_AWS_KMS_BOOTSTRAP_MODE: ${{ inputs.aws_kms_bootstrap_mode }}
          APOLYSIS_CONFIRM_PRODUCTION_HARDENING_AWS_KMS_KEY_CREATION: ${{ inputs.confirm_aws_kms_key_creation && '1' || '0' }}
        run: |
          ./scripts/test-production-hardening-aws-kms-signer-bootstrap.sh
          report="$(find target -path '*/apolysis-production-hardening-aws-kms-signer-bootstrap-report.json' -type f | sort | tail -n 1)"
          test -n "$report"
          key_id="$(jq -r '.aws_kms.key_arn // .aws_kms.key_id // empty' "$report")"
          test -n "$key_id"
          echo "APOLYSIS_PRODUCTION_HARDENING_AWS_KMS_KEY_ID=$key_id" >> "$GITHUB_ENV"

      - name: Upload AWS KMS signer bootstrap artifacts
        if: ${{ always() && inputs.run_aws_kms_bootstrap }}
        uses: actions/upload-artifact@v4
        with:
          name: production-hardening-aws-kms-signer-bootstrap
          path: target/production-hardening-aws-kms-signer-bootstrap.*
          if-no-files-found: error
          retention-days: 30

      - name: Run AWS KMS signing evidence gate
        run: ./scripts/test-production-hardening-aws-kms-signing.sh

      - name: Upload AWS KMS signing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-hardening-aws-kms-signing-evidence
          path: target/production-hardening-aws-kms-signing.*
          if-no-files-found: error
          retention-days: 30

  gke-managed-mesh:
    name: production-hardening.managed-cloud-service-mesh managed Cloud Service Mesh evidence
    if: ${{ inputs.run_gke_mesh }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      APOLYSIS_CONFIRM_PRODUCTION_HARDENING_MANAGED_CLOUD_SERVICE_MESH: "1"
      APOLYSIS_PRODUCTION_HARDENING_GKE_MESH_FLEET_PROJECT: ${{ vars.ProductionHardening_GKE_MESH_FLEET_PROJECT }}
      APOLYSIS_PRODUCTION_HARDENING_GKE_MESH_MEMBERSHIP: ${{ vars.ProductionHardening_GKE_MESH_MEMBERSHIP }}
      APOLYSIS_PRODUCTION_HARDENING_GKE_MESH_MEMBERSHIP_LOCATION: ${{ vars.ProductionHardening_GKE_MESH_MEMBERSHIP_LOCATION }}
      APOLYSIS_PRODUCTION_HARDENING_GKE_MESH_CLUSTER_NAME: ${{ vars.ProductionHardening_GKE_MESH_CLUSTER_NAME }}
      APOLYSIS_PRODUCTION_HARDENING_GKE_MESH_REVISION: ${{ vars.ProductionHardening_GKE_MESH_REVISION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.ProductionHardening_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.ProductionHardening_GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.ProductionHardening_GKE_CLUSTER_PROJECT }}
          cluster_name: ${{ vars.ProductionHardening_GKE_CLUSTER_NAME }}
          location: ${{ vars.ProductionHardening_GKE_CLUSTER_LOCATION }}

      - name: Run managed Cloud Service Mesh evidence gate
        run: ./scripts/test-production-hardening-managed-cloud-service-mesh.sh

      - name: Upload managed Cloud Service Mesh evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-hardening-managed-cloud-service-mesh-evidence
          path: target/production-hardening-managed-cloud-service-mesh.*
          if-no-files-found: error
          retention-days: 30

  assemble-final-bundle:
    name: production-hardening.final-provider-workflow-bundle final provider bundle assembly
    if: ${{ always() && inputs.assemble_final_bundle && (inputs.run_gke_mesh || inputs.retained_managed_mesh_provider_artifact) && (needs.gke-managed-mesh.result == 'success' || inputs.retained_managed_mesh_provider_artifact) && (inputs.run_aws_kms || inputs.retained_signing_provider_artifact) && (needs.aws-kms-signing.result == 'success' || inputs.retained_signing_provider_artifact) }}
    needs:
      - aws-kms-signing
      - gke-managed-mesh
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      APOLYSIS_REQUIRE_PRODUCTION_HARDENING_FINAL_BUNDLE_ENV: "1"
      APOLYSIS_RUN_PRODUCTION_HARDENING_FINAL_BUNDLE: "1"
      APOLYSIS_PRODUCTION_HARDENING_PROVIDER_ARTIFACT_ROOT: provider-artifacts/current:provider-artifacts/retained
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download current-run provider artifacts
        uses: actions/download-artifact@v4
        with:
          path: provider-artifacts/current
          pattern: production-hardening-*-evidence
          merge-multiple: true

      - name: Download retained WORM/registry artifacts
        if: ${{ inputs.retained_provider_artifact_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.retained_provider_artifact_run_id }}
          path: provider-artifacts/retained
          pattern: production-hardening-*-evidence
          merge-multiple: true

      - name: Import retained provider artifact package
        if: ${{ inputs.retained_provider_artifact_url != '' }}
        env:
          RETAINED_PROVIDER_ARTIFACT_URL: ${{ inputs.retained_provider_artifact_url }}
          RETAINED_PROVIDER_ARTIFACT_SHA256: ${{ inputs.retained_provider_artifact_sha256 }}
        run: |
          test -n "$RETAINED_PROVIDER_ARTIFACT_SHA256"
          mkdir -p provider-artifacts/retained-package provider-artifacts/retained
          curl -fsSL "$RETAINED_PROVIDER_ARTIFACT_URL" \
            -o provider-artifacts/retained-package/apolysis-production-hardening-retained-provider-artifacts.tar.gz
          echo "$RETAINED_PROVIDER_ARTIFACT_SHA256  provider-artifacts/retained-package/apolysis-production-hardening-retained-provider-artifacts.tar.gz" \
            | sha256sum -c -
          tar -xzf provider-artifacts/retained-package/apolysis-production-hardening-retained-provider-artifacts.tar.gz \
            -C provider-artifacts/retained

      - name: Prepare and validate final provider bundle
        run: ./scripts/prepare-production-hardening-final-provider-bundle-env.sh

      - name: Upload final provider bundle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-hardening-final-external-provider-bundle
          path: |
            target/production-hardening-final-provider-bundle-env.*
            target/production-hardening-final-external-provider-bundle.*
          if-no-files-found: error
          retention-days: 30
