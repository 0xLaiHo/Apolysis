name: Release Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job name is kept as "release-validation local gates" because it is the
  # required status check configured in branch protection. Renaming it also
  # requires updating branch protection.
  release-validation-local-gates:
    name: release-validation local gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Quickstart smoke test
        run: make test-quickstart
