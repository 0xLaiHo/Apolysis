name: Release Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-validation-local-gates:
    name: release-validation local gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run JSONL schema contract gate
        run: make test-jsonl-schema-contract

      - name: Run community surface contract
        run: make test-community-surface

      - name: Run Codex mismatch demo contract
        run: make test-codex-mismatch-demo

      - name: Run Codex live demo runbook contract
        run: make test-codex-live-demo-runbook

      - name: Run Codex live demo public assets contract
        run: make test-codex-live-demo-public-assets

      - name: Run Codex live demo launch blog contract
        run: make test-codex-live-demo-launch-blog

      - name: Run Codex live demo final assets contract
        run: make test-codex-live-demo-final-assets

      - name: Run intent correlation contract
        run: make test-intent-correlation

      - name: Run audit write budget contract
        run: make test-audit-write-budget

      - name: Run offline hash-chain verification contract
        run: make test-offline-hash-chain-verify

      - name: Run timeline shipping contract
        run: make test-timeline-shipping
